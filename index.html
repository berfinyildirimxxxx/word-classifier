<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Classifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #16A34A; --accent-light: #DCFCE7; --accent-text: #166534;
  --bg: #F0FDF4; --bg-secondary: #E2E8F0; --card: #FFFFFF;
  --text: #1E293B; --text-secondary: #64748B; --text-tertiary: #94A3B8;
  --border: #D1D5DB; --shadow: 0 1px 3px rgba(0,0,0,0.06); --radius: 12px;
  --btn-bg: #F3F4F6; --btn-border: #D1D5DB; --btn-text: #374151;
  --btn-active-bg: #E5E7EB; --btn-active-border: #9CA3AF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-box {
  background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 48px 40px; box-shadow: var(--shadow); max-width: 420px; width: 100%; text-align: center;
}
.login-box h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; color: var(--accent-text); }
.login-box .subtitle { color: var(--text-secondary); margin-bottom: 36px; font-size: 14px; line-height: 1.6; }
.login-box input {
  width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 16px; font-family: inherit; outline: none; background: #FAFAFA; color: var(--text);
}
.login-box input:focus { border-color: var(--accent); }
.login-box input::placeholder { color: var(--text-tertiary); }
.login-box button {
  width: 100%; padding: 14px; margin-top: 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer;
}
.login-box button:hover { opacity: 0.9; }
.email-error { display: none; color: #DC2626; font-size: 13px; margin-top: 8px; text-align: left; }

.app { display: none; }
.app.active { display: flex; flex-direction: column; min-height: 100vh; }

.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; position: sticky; top: 0; z-index: 10; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.header-title { font-size: 16px; font-weight: 700; color: var(--accent-text); }
.header-right { display: flex; align-items: center; gap: 12px; }
.worker-badge { background: var(--accent-light); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--accent-text); border: 1px solid #BBF7D0; }
.batch-badge { background: #F3F4F6; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--text-secondary); border: 1px solid var(--border); }
.save-indicator { font-size: 11px; color: var(--text-tertiary); }
.save-indicator.saving { color: var(--accent); }
.lang-badge { background: #EFF6FF; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; color: #1D4ED8; border: 1px solid #BFDBFE; letter-spacing: 0.5px; }
.progress-bar { height: 5px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s ease; width: 0%; }
.progress-text { font-size: 12px; color: var(--text-secondary); margin-top: 6px; text-align: right; font-variant-numeric: tabular-nums; }

.content { display: flex; flex: 1; }
.cards-section { flex: 1; padding: 24px 40px; display: flex; flex-direction: column; align-items: center; }
.cards-container { width: 100%; max-width: 560px; }

.word-card {
  background: var(--card); border-radius: var(--radius);
  padding: 20px 28px 18px; margin-bottom: 10px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  border-left: 4px solid transparent; transition: all 0.2s;
}
.word-card.selected { border-left-color: var(--accent); background: var(--accent-light); }

.word-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
.word-text { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
.word-meta { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
.word-index { color: var(--text-tertiary); font-size: 11px; font-weight: 500; margin-right: 8px; }

.type-buttons { display: flex; gap: 6px; }
.type-btn {
  flex: 1; padding: 9px 4px; border: 1.5px solid var(--btn-border);
  border-radius: 8px; background: var(--btn-bg); font-size: 13px;
  font-weight: 600; font-family: inherit; cursor: pointer;
  transition: all 0.15s; color: var(--btn-text);
}
.type-btn:hover { background: var(--btn-active-bg); border-color: var(--btn-active-border); }
.type-btn.active { background: var(--accent); border-color: var(--accent); color: #FFFFFF; }

.nav-buttons {
  display: flex; gap: 10px; margin-top: 20px; width: 100%; max-width: 560px;
  position: sticky; bottom: 16px; align-items: center;
}
.nav-btn {
  padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: all 0.15s; border: 1.5px solid var(--border);
}
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.back-btn { background: var(--card); color: var(--text-secondary); }
.back-btn:hover:not(:disabled) { background: var(--btn-active-bg); }
.next-btn { background: var(--accent); color: #fff; border-color: var(--accent); flex: 1; text-align: center; }
.next-btn:hover:not(:disabled) { opacity: 0.9; }
.next-btn:disabled { background: var(--btn-bg); color: var(--text-tertiary); border-color: var(--border); }
.page-info { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; }

.sidebar {
  width: 500px; background: var(--card); border-left: 1px solid var(--border);
  padding: 18px 16px; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto;
}
.sidebar-heading { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-tertiary); margin-bottom: 12px; }
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-desc { padding: 10px 12px; border-radius: 8px; margin-bottom: 0; font-size: 11.5px; line-height: 1.5; background: #F9FAFB; border: 1px solid var(--border); color: var(--text); }
.type-desc h3 { font-size: 12px; font-weight: 700; margin-bottom: 5px; }
.type-desc ul { margin: 4px 0 4px 14px; padding: 0; }
.type-desc li { margin-bottom: 2px; line-height: 1.45; }
.type-desc .kisacasi { font-size: 11px; font-style: italic; color: var(--text-secondary); margin-top: 6px; padding-top: 5px; border-top: 1px solid var(--border); }
.sidebar-toggle {
  display: flex; width: 100%; background: none; border: none; font-family: inherit;
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-tertiary); cursor: pointer; padding: 14px 0; margin: 0;
  text-align: left; align-items: center; justify-content: space-between;
}
.toggle-icon { font-size: 10px; transition: transform 0.2s; display: inline-block; }
.sidebar-toggle.open .toggle-icon { transform: rotate(180deg); }
.sidebar-heading { display: none; }
.type-grid { display: none; }
.type-grid.open { display: grid; }

.loading-overlay { display: flex; align-items: center; justify-content: center; padding: 80px 20px; flex-direction: column; gap: 16px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.done-screen { display: none; text-align: center; padding: 80px 20px; }
.done-screen h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--accent-text); }
.done-screen p { color: var(--text-secondary); font-size: 15px; }
.error-banner { display: none; background: #FEF2F2; color: #DC2626; padding: 10px 24px; font-size: 13px; text-align: center; border-bottom: 1px solid #FECACA; }
.error-full { display: none; text-align: center; padding: 80px 20px; flex-direction: column; align-items: center; gap: 16px; }
.error-full h2 { font-size: 20px; font-weight: 700; color: #DC2626; }
.error-full p { color: var(--text-secondary); font-size: 14px; max-width: 400px; line-height: 1.6; }
.retry-btn { padding: 12px 28px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 8px; }
.retry-btn:hover { opacity: 0.9; }

@media (max-width: 900px) {
  .content { flex-direction: column-reverse; }
  .sidebar { width: 100%; position: static; height: auto; border-left: none; border-bottom: 1px solid var(--border); padding: 0 16px; }
  .type-grid { grid-template-columns: 1fr 1fr; margin-bottom: 12px; }
  .cards-section { padding: 16px; }
  .word-text { font-size: 20px; }
  .word-card { padding: 16px; }
}
@media (max-width: 500px) {
  .type-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1 id="loginTitle">Word Classifier</h1>
    <p class="subtitle">Enter your email address to start classifying.</p>
    <input type="email" id="workerInput" placeholder="name@example.com" autofocus>
    <p class="email-error" id="emailError">Please enter a valid email address.</p>
    <button onclick="startApp()">Start</button>
  </div>
</div>

<div class="app" id="mainApp">
  <div class="header">
    <div class="header-top">
      <span class="header-title">Word Classifier</span>
      <div class="header-right">
        <span class="save-indicator" id="saveIndicator"></span>
        <span class="lang-badge" id="langBadge"></span>
        <span class="batch-badge" id="batchBadge"></span>
        <span class="worker-badge" id="workerBadge">—</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Loading...</div>
  </div>
  <div class="error-banner" id="errorBanner"></div>
  <div class="content">
    <div class="cards-section">
      <div class="loading-overlay" id="loadingState">
        <div class="spinner"></div>
        <span style="color:var(--text-secondary); font-size:14px;">Loading words...</span>
      </div>
      <div class="error-full" id="errorFull">
        <h2>Could not load words</h2>
        <p id="errorFullMsg">An error occurred while connecting to the server.</p>
        <button class="retry-btn" onclick="loadAllWords()">Try Again</button>
      </div>
      <div class="cards-container" id="wordCards"></div>
      <div class="nav-buttons" id="navButtons" style="display:none;">
        <button class="nav-btn back-btn" id="backBtn" onclick="goBack()" disabled>← Back</button>
        <span class="page-info" id="pageInfo"></span>
        <button class="nav-btn next-btn" id="nextBtn" onclick="goNext()" disabled>Next →</button>
      </div>
      <div class="done-screen" id="doneScreen">
        <h2>All Done!</h2>
        <p>You've classified every word in this batch. Thank you!</p>
      </div>
    </div>
    <div class="sidebar">
      <button class="sidebar-toggle" id="typeToggle" onclick="toggleTypeDesc()">
        <span id="toggleLabel">Type Descriptions</span> <span class="toggle-icon" id="toggleIcon">▼</span>
      </button>
      <div class="type-grid" id="typeGrid"></div>
    </div>
  </div>
</div>

<script>
var DESCRIPTIONS = {
  TR: {
    label: 'Type Açıklamaları',
    types: [
      { title: 'Type 1 — Oyunda Kullanılamaz', bullets: [
          'Özel isim özelliği çok baskın kelimeler (ör. Ali gibi kişi adları; İpek olabilir)',
          'Küfür, argo, hakaret, cinsel içerik veya şiddete doğrudan atıf',
          'Alkollü içecek veya uyuşturucu madde adları',
          'Ağır hastalık, travma veya güçlü rahatsızlık uyandıranlar',
          'İğrenç veya tiksinti uyandıran kelimeler',
          'Anlamı bilinmeyen ya da doğrulanamayan kelimeler'
        ], kisacasi: 'Ya yapısal olarak uygun değil, ya içerik olarak sakıncalı, ya da anlamı belirsiz.' },
      { title: 'Type 2 — Geçerli Ama Oyun İçin Uygun Değil', bullets: [
          'Nadir, eski, edebi veya bölgesel kelimeler (ör. dilber, tirit)',
          'Teknik terimler: tıp, hukuk, kimya, bilgisayar, dilbilgisi vb.',
          'Kullanımı dar, resmi veya bölgesel kelimeler (ör. epeyce, fiziki)',
          'Hafif olumsuz ama Type 1 kadar ağır olmayan (ör. dırdır, dişsiz)',
          'Türetilmiş ama bağımsız kelime olarak zayıf formlar (ör. burunlu, filmci)',
          'Fiil kökü veya emir kipi gibi görünen formlar (ör. tanı, tanış)',
          'Dini terimler, hassas kimlik ifadeleri, ağır sağlık konuları',
          'Olumsuzluk eki almış yeni bir kelime oluşturmamış fiiller (ör. Anlatma Type 3 iken Gitme Type 2 olabilir)'
        ], kisacasi: 'Kelime gerçek ve anlamlı, ama ya çoğu kişi bilmez, ya çok niş, ya da oyun bağlamında sorunlu.' },
      { title: 'Type 3 — Oynanabilir Kelime', bullets: [
          'Ortalama Türk oyuncusunun bağlam olmadan tanıyabileceği kelimeler',
          'Farklı günlük bağlamlarda aktif olarak kullanılan kelimeler',
          'Sözlükte var olmak yetmez; geniş çapta bilinmeli ve kullanılmalı',
          'Fiiller -mak/-mek haliyle, yaygınsa buraya girer (ör. dolmak, duymak)',
          'Somut nesneler (ör. taksi), yaygın sıfatlar (ör. terli), bilinen soyut kavramlar (ör. esaret)',
          'Hafif olumsuz ama herkesçe bilinen ve aktif kullanılan (ör. düşman, doymaz)'
        ], kisacasi: 'Herkes bilir, herkes anlar, oyunda kimseyi şaşırtmaz.' },
      { title: 'Type 4 — Çekirdek Kelime', bullets: [
          'Yaşı, eğitimi veya bölgesi fark etmeksizin herkesin bildiği ve kullandığı kelimeler',
          'Günlük konuşmanın vazgeçilmezi: temel isimler, sıfatlar, fiiller ve kavramlar',
          'Fiiller -mak/-mek haliyle dahil, temel ve anlaşılır olmalı (ör. yemek, içmek, anlatmak)',
          'Hiçbir açıklamaya ihtiyaç duymadan herkesin aklına aynı şeyin geldiği kelimeler',
          'Güzel, temiz, açık Türkçe — dilin iskeletini oluşturan çekirdek havuz (ör. yol, güneş, büyük, anne, baba)'
        ], kisacasi: 'Türkçenin herkes tarafından bilinen, günlük hayatın içinden, tartışmasız kelimeleri.' }
    ]
  },
  EN: {
    label: 'Type Descriptions',
    types: [
      { title: 'Type 1 — Excluded', bullets: [
          'Profanity, slurs, hate speech, or explicit sexual content',
          'Severe violence, death, traumatic or deeply disturbing content',
          'Repulsive content (bodily waste, filth, putrefaction)',
          'Illegal drugs/narcotics (note: beer, wine, vodka are NOT Type 1)',
          'Brand names, company names, acronyms/abbreviations (e.g. NASA, Jeep)',
          'Personal names where the name reading is dominant (e.g. Jack, Bob)',
          'Standalone suffixes/prefixes, truncated contractions (e.g. ish, doesn)',
          'Nonsensical derived forms; pure interjections (e.g. eww, ugh)',
          'Unverified words: if you cannot determine the meaning, mark Type 1'
        ], kisacasi: 'Structurally unsuitable, harmful/offensive content, a proper noun, or meaning unknown.' },
      { title: 'Type 2 — Valid But Not Suitable for Gameplay', bullets: [
          'Rare, archaic, literary, or occupation-specific words (e.g. ablution, furlong)',
          'Technical/specialist terms: science, medicine, law, computing (e.g. isotope, biopsy)',
          'Too formal, literary, or dated for broad everyday use (e.g. beseech, forthwith)',
          'Words with crude/sexual slang shadow (e.g. beaver, climax, steamy)',
          'Regular -ed past tenses (walked, played) and -s/-es plural or 3rd-person forms (dogs, runs)',
          "Possessive/contraction forms (dog's, it's) and function word inflections (was, had, its)",
          'Direct insults (e.g. stupid, loser), crime labels (e.g. thief, bully), place names',

      { title: 'Type 3 — Playable Word', bullets: [
          'Recognized without specialist context; used across multiple everyday situations',
          'Being in the dictionary or taught at school alone is NOT enough',
          'Common objects, foods, materials (e.g. table, bread, phone, hammer)',
          'Common base verbs (e.g. run, cook), irregular pasts (went, took), -ing forms (running)',
          'Common adjectives and broadly known concepts (e.g. big, happy, freedom, method)',
          'Alcoholic beverages when broadly recognized (e.g. beer, wine, whiskey)',
          'Formal but widely recognized without specialist training (e.g. valuation, disparity)'
        ], kisacasi: "Everyone knows it, everyone understands it, it won't surprise anyone in the game." },
      { title: 'Type 4 — Core Word', bullets: [
          'Known and used by everyone regardless of age, education, or region',
          'Essential nouns, adjectives, and verbs indispensable in daily conversation',
          'No explanation or context needed — everyone immediately thinks of the same thing',
          'The most comfortable and enjoyable layer of the game',
          'Examples: house, water, sun, big, small, run, eat, mother, father, dog, cat, happy'
        ], kisacasi: 'Universally known, part of everyday life, unquestionably common English words.' }
    ]
  },
  RU: {
    label: 'Описания типов',
    types: [
      { title: 'Тип 1 — Исключено из игры', bullets: [
          'Мат и все его производные формы (блядь, хуй, пизда, ёбать и любые слова от этих корней)',
          'Оскорбления, унижения, язык ненависти',
          'Откровенный сексуальный контент и грубые/жаргонные названия половых органов',

      { title: 'Тип 2 — Допустимо, но не для игры', bullets: [

          'Технические/научные термины: медицина, право, химия, IT',

          'Самостоятельное и непроизводное слово — не образовано от другого слова (не инфинитив, не наречие)',
          'Бесспорно — никаких пограничных случаев или конфликтов правил',
          'Примеры: дом, кошка, стол, книга, хлеб, дверь, солнце, река, рука, голова, дерево, время, работа, деньги, большой, новый, красный',
          '⚠️ НЕ Тип 4: инфинитивы (читать → Тип 3), наречия (быстро → Тип 3), алкоголь (водка → Тип 3)'
        ], kisacasi: 'Всем известные, из повседневной жизни, бесспорно общеупотребительные русские слова.' }
    ]
  }
};

var API_URL = 'https://script.google.com/macros/s/AKfycbzoWQ5WZvXOzKQXDhOcAcRcophfZ5RoOLZdeQFzLTskL0uEO3ckga6dIVDsrPhO0xqWhQ/exec';
var PAGE_SIZE = 10;

// URL parametreleri
var urlP = new URLSearchParams(window.location.search);
var TASK = (urlP.get('task') || '').toUpperCase();   // örn: "EN_005"
var LANG = TASK ? TASK.split('_')[0] : '';            // örn: "EN"
var PRE_WORKER = urlP.get('worker') || '';

var workerId = '';
var allWords = [];      // tum kelimeler (sabit sira)
var selections = {};    // {globalIndex: type}
var savedSelections = {};  // sheete kaydedilmis olanlar (karsilastirma icin)
var currentPage = 0;
var totalPages = 0;
var totalDone = 0;

// ── Fetch ──
function apiFetch(params) {
  var url = new URL(API_URL);
  Object.keys(params).forEach(function(k) { url.searchParams.set(k, String(params[k])); });
  var controller = new AbortController();
  var timeout = setTimeout(function() { controller.abort(); }, 60000);
  return fetch(url.toString(), { signal: controller.signal })
    .then(function(res) { clearTimeout(timeout); if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .catch(function(err) { clearTimeout(timeout); if (err.name === 'AbortError') throw new Error('Timeout'); throw err; });
}

// ── Start ──
function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v); }

function startApp() {
  var input = document.getElementById('workerInput').value.trim().toLowerCase();
  if (!input) return;
  if (!isValidEmail(input)) {
    document.getElementById('emailError').style.display = 'block';
    document.getElementById('workerInput').focus();
    return;
  }
  document.getElementById('emailError').style.display = 'none';
  workerId = input;
  try { localStorage.setItem('workerId', workerId); } catch(e) {}
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').classList.add('active');
  document.getElementById('workerBadge').textContent = workerId;
  document.getElementById('langBadge').textContent = LANG || '—';
  document.getElementById('batchBadge').textContent = TASK || '—';
  loadAllWords();
}
(function() {
  var langNames = { TR: 'Turkish', EN: 'English', RU: 'Russian' };
  var name = langNames[LANG] || LANG;
  document.getElementById('loginTitle').textContent = name ? 'Word Classifier — ' + name : 'Word Classifier';
  if (PRE_WORKER) {
    document.getElementById('workerInput').value = PRE_WORKER;
  } else {
    try { var s = localStorage.getItem('workerId'); if (s) document.getElementById('workerInput').value = s; } catch(e) {}
  }
  renderSidebar();
})();
document.getElementById('workerInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') startApp(); });

// ── Tum kelimeleri yukle (tek seferde) ──
function loadAllWords() {
  setLoading(true); hideError();
  if (!TASK) { showError('Geçersiz link. Lütfen size verilen linki kullanın.'); return; }
  var params = { action: 'getWords', worker: workerId, task: TASK };

  apiFetch(params)
  .then(function(data) {
    if (data.error) throw new Error(data.error);
    allWords = data.words;
    totalPages = Math.ceil(allWords.length / PAGE_SIZE);

    // Mevcut siniflandirmalari yukle
    selections = {};
    savedSelections = {};
    totalDone = 0;
    allWords.forEach(function(w, i) {
      if (w.type) {
        var t = parseInt(w.type);
        if (t >= 1 && t <= 4) {
          selections[i] = t;
          savedSelections[i] = t;
          totalDone++;
        }
      }
    });

    updateProgress();
    if (allWords.length === 0) { showDone(); return; }
    currentPage = 0;

    // Ilk yapilmamis sayfaya git
    for (var p = 0; p < totalPages; p++) {
      var start = p * PAGE_SIZE;
      var end = Math.min(start + PAGE_SIZE, allWords.length);
      var allPageDone = true;
      for (var j = start; j < end; j++) {
        if (selections[j] === undefined) { allPageDone = false; break; }
      }
      if (!allPageDone) { currentPage = p; break; }
    }

    renderPage();
    setLoading(false);
  })
  .catch(function(err) { showError('Loading failed: ' + err.message); });
}

// ── Render ──
function renderPage() {
  var container = document.getElementById('wordCards');
  container.innerHTML = '';
  document.getElementById('navButtons').style.display = 'flex';

  var start = currentPage * PAGE_SIZE;
  var end = Math.min(start + PAGE_SIZE, allWords.length);

  for (var i = start; i < end; i++) {
    var w = allWords[i];
    var sel = selections[i];
    var card = document.createElement('div');
    card.className = 'word-card' + (sel ? ' selected' : '');
    card.id = 'card-' + i;
    card.innerHTML =
      '<div class="word-top">' +
        '<span class="word-text"><span class="word-index">' + (i + 1) + '</span>' + escapeHtml(w.kelime) + '</span>' +
        '<span class="word-meta">' + w.kelime.length + ' letters</span>' +
      '</div>' +
      '<div class="type-buttons">' +
        '<button class="type-btn' + (sel === 1 ? ' active' : '') + '" onclick="selectType(' + i + ',1)">Type 1</button>' +
        '<button class="type-btn' + (sel === 2 ? ' active' : '') + '" onclick="selectType(' + i + ',2)">Type 2</button>' +
        '<button class="type-btn' + (sel === 3 ? ' active' : '') + '" onclick="selectType(' + i + ',3)">Type 3</button>' +
        '<button class="type-btn' + (sel === 4 ? ' active' : '') + '" onclick="selectType(' + i + ',4)">Type 4</button>' +
      '</div>';
    container.appendChild(card);
  }
  updateNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Type sec ──
function selectType(i, type) {
  selections[i] = type;
  var card = document.getElementById('card-' + i);
  card.className = 'word-card selected';
  var btns = card.querySelectorAll('.type-btn');
  btns.forEach(function(b) { b.classList.remove('active'); });
  btns[type - 1].classList.add('active');

  // Daha once kaydedilmemisse done sayisini artir
  if (savedSelections[i] === undefined) {
    totalDone++;
    updateProgress();
  }

  updateNav();
}

// ── Nav ──
function goNext() {
  saveCurrentPage();
  if (currentPage < totalPages - 1) { currentPage++; renderPage(); }
}
function goBack() {
  saveCurrentPage();
  if (currentPage > 0) { currentPage--; renderPage(); }
}
function updateNav() {
  document.getElementById('backBtn').disabled = (currentPage <= 0);
  var start = currentPage * PAGE_SIZE;
  var end = Math.min(start + PAGE_SIZE, allWords.length);
  var allDone = true;
  for (var j = start; j < end; j++) { if (selections[j] === undefined) { allDone = false; break; } }
  document.getElementById('nextBtn').disabled = !allDone;
  document.getElementById('nextBtn').textContent = allDone ? 'Next →' : 'Select all to continue';
  document.getElementById('pageInfo').textContent = (currentPage + 1) + ' / ' + totalPages;
}

// ── Mevcut sayfadaki degisen kelimeleri kaydet ──
function saveCurrentPage() {
  var start = currentPage * PAGE_SIZE;
  var end = Math.min(start + PAGE_SIZE, allWords.length);
  var toSave = [];

  for (var i = start; i < end; i++) {
    if (selections[i] !== undefined && selections[i] !== savedSelections[i]) {
      toSave.push({ idx: i, w: allWords[i], type: selections[i] });
    }
  }
  if (toSave.length === 0) return;

  setSave('Saving...');
  var q = toSave.slice();
  function next() {
    if (q.length === 0) {
      setSave('Saved ✓');
      setTimeout(function() { setSave(''); }, 2000);
      return;
    }
    var item = q.shift();
    apiFetch({
      action: 'submit', kelime: item.w.kelime, harf_sayisi: item.w.kelime.length,
      score: item.w.score, type: item.type, worker: workerId, task: TASK
    })
    .then(function() { savedSelections[item.idx] = item.type; next(); })
    .catch(function() { q.unshift(item); setTimeout(next, 1500); });
  }
  next();
}

// Sayfa kapanirken kaydet
window.addEventListener('beforeunload', function() { saveCurrentPage(); });
setInterval(saveCurrentPage, 120000);

// ── UI ──
function updateProgress() {
  var pct = allWords.length > 0 ? (totalDone / allWords.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = totalDone + ' / ' + allWords.length + ' (' + pct.toFixed(1) + '%)';
}
function setSave(t) { var el = document.getElementById('saveIndicator'); el.textContent = t; el.className = 'save-indicator' + (t.indexOf('Saving') >= 0 ? ' saving' : ''); }
function setLoading(s) {
  document.getElementById('loadingState').style.display = s ? 'flex' : 'none';
  document.getElementById('errorFull').style.display = 'none';
  document.getElementById('wordCards').style.display = s ? 'none' : 'block';
  document.getElementById('navButtons').style.display = s ? 'none' : 'flex';
  document.getElementById('doneScreen').style.display = 'none';
}
function showDone() { setLoading(false); document.getElementById('wordCards').style.display = 'none'; document.getElementById('navButtons').style.display = 'none'; document.getElementById('doneScreen').style.display = 'block'; saveCurrentPage(); }
function showError(m) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('wordCards').style.display = 'none';
  document.getElementById('navButtons').style.display = 'none';
  document.getElementById('errorFullMsg').textContent = m;
  document.getElementById('errorFull').style.display = 'flex';
}
function hideError() { document.getElementById('errorFull').style.display = 'none'; }
function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toggleTypeDesc() {
  var grid = document.getElementById('typeGrid');
  var btn = document.getElementById('typeToggle');
  var isOpen = grid.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
}
function renderSidebar() {
  var desc = DESCRIPTIONS[LANG] || DESCRIPTIONS['TR'];
  document.getElementById('toggleLabel').textContent = desc.label;
  var grid = document.getElementById('typeGrid');
  grid.innerHTML = desc.types.map(function(d) {
    return '<div class="type-desc"><h3>' + d.title + '</h3><ul>' +
      d.bullets.map(function(b) { return '<li>' + b + '</li>'; }).join('') +
      '</ul><p class="kisacasi">' + d.kisacasi + '</p></div>';
  }).join('');
}
</script>
</body>
</html>
